services:
  postgres:
    image: postgres:17
    platform: ${PLATFORM:-linux/amd64}
    environment:
      POSTGRES_DB: hyperextract
      POSTGRES_USER: hyperextract
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${HE_DATA_ROOT:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperextract"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [database]

  he-api:
    image: ${HE_IMAGE:-hyper-extract-service:dev}
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: ..
      dockerfile: docker/image/Dockerfile
    command: ["he-api"]
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      HE_SERVICE_DATABASE_URL: postgresql+psycopg://hyperextract:${POSTGRES_PASSWORD}@postgres/hyperextract
      HE_SERVICE_EXCHANGE_ROOT: /exchange
      HE_SERVICE_MODEL_PROFILES: /run/config/model-profiles.toml
      HE_SERVICE_MAX_UPLOAD_BYTES: ${HE_SERVICE_MAX_UPLOAD_BYTES:-500000000}
      HE_SERVICE_MAX_EXPANDED_BYTES: ${HE_SERVICE_MAX_EXPANDED_BYTES:-2147483648}
      HE_SERVICE_MAX_ARCHIVE_MEMBERS: ${HE_SERVICE_MAX_ARCHIVE_MEMBERS:-20000}
      HE_SERVICE_UPLOAD_READ_BLOCK: ${HE_SERVICE_UPLOAD_READ_BLOCK:-1048576}
      HE_SERVICE_PROGRESS_SECONDS: ${HE_SERVICE_PROGRESS_SECONDS:-5}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
    volumes:
      - ${HE_DATA_ROOT:-./data}/exchange:/exchange
      - type: bind
        source: ${MODEL_PROFILES_FILE:-./conf/model-profiles.example.toml}
        target: /run/config/model-profiles.toml
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u,sys; sys.exit(0 if u.urlopen('http://127.0.0.1:8000/health/ready',timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 3
    networks: [database, service-api]

  he-worker:
    image: ${HE_IMAGE:-hyper-extract-service:dev}
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: ..
      dockerfile: docker/image/Dockerfile
    command: ["he-worker"]
    restart: unless-stopped
    stop_grace_period: 90s
    env_file:
      - path: .env
        required: false
    environment:
      HE_SERVICE_DATABASE_URL: postgresql+psycopg://hyperextract:${POSTGRES_PASSWORD}@postgres/hyperextract
      HE_SERVICE_EXCHANGE_ROOT: /exchange
      HE_SERVICE_MODEL_PROFILES: /run/config/model-profiles.toml
      HE_SERVICE_PROGRESS_SECONDS: ${HE_SERVICE_PROGRESS_SECONDS:-5}
      HE_SERVICE_PIPELINE_MAX_WORKERS: ${HE_SERVICE_PIPELINE_MAX_WORKERS:-2}
      HE_PROBE_ROOT: /exchange/probes
    volumes:
      - ${HE_DATA_ROOT:-./data}/exchange:/exchange
      - type: bind
        source: ${MODEL_PROFILES_FILE:-./conf/model-profiles.example.toml}
        target: /run/config/model-profiles.toml
        read_only: true
        bind:
          create_host_path: false
    depends_on:
      postgres:
        condition: service_healthy
    networks: [database, model-egress]

networks:
  database:
    internal: true
  service-api:
    name: ${API_NETWORK_NAME:-hyper-extract-api}
    internal: true
  model-egress: {}
