services:
  postgres:
    image: postgres:17
    platform: ${PLATFORM:-linux/amd64}
    environment:
      POSTGRES_DB: hyperextract
      POSTGRES_USER: hyperextract
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperextract"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [database]

  he-migrate:
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
    restart: "no"
    environment:
      HE_SERVICE_DATABASE_URL: postgresql+psycopg://hyperextract:${POSTGRES_PASSWORD}@postgres/hyperextract
    depends_on:
      postgres:
        condition: service_healthy
    networks: [database]

  he-api:
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
    command: ["uv", "run", "--no-sync", "he-api"]
    environment:
      HE_SERVICE_DATABASE_URL: postgresql+psycopg://hyperextract:${POSTGRES_PASSWORD}@postgres/hyperextract
      HE_SERVICE_EXCHANGE_ROOT: /exchange
      HE_SERVICE_MODEL_PROFILES: /run/config/model-profiles.toml
    volumes:
      - exchange-data:/exchange
      - ${MODEL_PROFILES_FILE:-./model-profiles.example.toml}:/run/config/model-profiles.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      he-migrate:
        condition: service_completed_successfully
    networks: [database, service-api]

  he-worker:
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
    command: ["uv", "run", "--no-sync", "he-worker"]
    env_file:
      - path: .env
        required: false
    environment:
      HE_SERVICE_DATABASE_URL: postgresql+psycopg://hyperextract:${POSTGRES_PASSWORD}@postgres/hyperextract
      HE_SERVICE_EXCHANGE_ROOT: /exchange
      HE_SERVICE_MODEL_PROFILES: /run/config/model-profiles.toml
    volumes:
      - exchange-data:/exchange
      - ${MODEL_PROFILES_FILE:-./model-profiles.example.toml}:/run/config/model-profiles.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      he-migrate:
        condition: service_completed_successfully
    networks: [database, model-egress]

volumes:
  exchange-data:
    name: ${EXCHANGE_VOLUME_NAME:-hyper-extract-exchange}
  postgres-data:

networks:
  database:
    internal: true
  service-api:
    name: ${API_NETWORK_NAME:-hyper-extract-api}
    internal: true
  model-egress: {}
