services:
  postgres:
    image: postgres:17
    platform: ${PLATFORM:-linux/amd64}
    environment:
      POSTGRES_DB: hyperextract
      POSTGRES_USER: hyperextract
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyperextract"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [hyper_extract_internal]

  he-migrate:
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
    restart: "no"
    environment:
      HE_SERVICE_DATABASE_URL: postgresql+psycopg://hyperextract:${POSTGRES_PASSWORD}@postgres/hyperextract
    depends_on:
      postgres:
        condition: service_healthy
    networks: [hyper_extract_internal]

  he-api:
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
    command: ["uv", "run", "--no-sync", "he-api"]
    environment:
      HE_SERVICE_DATABASE_URL: postgresql+psycopg://hyperextract:${POSTGRES_PASSWORD}@postgres/hyperextract
      HE_SERVICE_EXCHANGE_ROOT: /exchange
    volumes:
      - hyper_extract_exchange:/exchange
    depends_on:
      postgres:
        condition: service_healthy
      he-migrate:
        condition: service_completed_successfully
    networks: [hyper_extract_internal]

  he-worker:
    platform: ${PLATFORM:-linux/amd64}
    build:
      context: ..
      dockerfile: docker/service.Dockerfile
    command: ["uv", "run", "--no-sync", "he-worker"]
    env_file: ../.env
    environment:
      HE_SERVICE_DATABASE_URL: postgresql+psycopg://hyperextract:${POSTGRES_PASSWORD}@postgres/hyperextract
      HE_SERVICE_EXCHANGE_ROOT: /exchange
      HE_SERVICE_MODEL_PROFILES: /app/config/model-profiles.toml
    volumes:
      - hyper_extract_exchange:/exchange
      - ./model-profiles.example.toml:/app/config/model-profiles.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
      he-migrate:
        condition: service_completed_successfully
    networks: [hyper_extract_internal, model_egress]

volumes:
  hyper_extract_exchange:
  postgres-data:

networks:
  hyper_extract_internal:
    internal: true
  model_egress: {}
